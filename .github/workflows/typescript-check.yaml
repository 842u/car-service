name: Typescript Check

on:
  workflow_dispatch:
  workflow_call:

jobs:
  typescript-check:
    timeout-minutes: 10
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install Dependencies
        run: npm ci

      - name: Run Typescript
        run: npx tsc --noEmit

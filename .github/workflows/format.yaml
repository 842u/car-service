name: Format

on:
  workflow_dispatch:
  workflow_call:

jobs:
  format:
    timeout-minutes: 10
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install Dependencies
        run: npm ci

      - name: Run Format Script
        run: npm run format

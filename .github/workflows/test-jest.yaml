name: Test Jest

on:
  workflow_dispatch:
  workflow_call:

jobs:
  test-jest:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    environment:
      name: Test

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install Dependencies
        run: npm ci

      - name: Run Jest Tests
        run: npm run test:jest
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
